<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Cartão Backbone</title>
<style>
  @font-face {
    font-family: 'GT Sectra';
    src: url('GT-Sectra-Black.woff2') format('woff2'),
         url('GT-Sectra-Black.woff') format('woff');
    font-weight: 900;
    font-style: normal;
    font-display: swap;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #F0F0F0;
    color: #000;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .cartao {
    background: #EAEAEA;
    border-radius: 24px;
    max-width: 420px;
    width: 100%;
    padding: 30px 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    text-align: center;
  }

  .logo {
    max-width: 260px;
    width: 100%;
    height: auto;
    margin: 0 auto 20px;
    display: block;
  }

  .qr-container {
    background: #fff;
    padding: 12px;
    border-radius: 12px;
    margin: 0 auto 20px;
    max-width: 260px;
  }
  .qr-container canvas, .qr-container img {
    width: 100%;
    height: auto;
    display: block;
  }

  .promo-nome {
    max-width: 260px;
    width: 100%;
    height: auto;
    margin: 0 auto 24px;
    display: block;
  }

  .copos {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    max-width: 340px;
    margin: 0 auto 24px;
  }
  .copo {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .copo img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

  .btn-dados {
    background: #1a1a1a;
    color: #fff;
    border: 2px solid #333;
    border-radius: 12px;
    padding: 16px 24px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    max-width: 340px;
    transition: opacity 0.2s;
  }
  .btn-dados:hover { opacity: 0.9; }

  /* Modal de dados */
  .modal {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 100;
  }
  .modal.aberto { display: flex; }
  .modal-conteudo {
    background: #fff;
    border-radius: 20px;
    max-width: 400px;
    width: 100%;
    padding: 28px 24px;
  }
  .modal-titulo {
    font-family: 'GT Sectra', Georgia, serif;
    font-size: 24px;
    text-align: center;
    margin-bottom: 20px;
    color: #1a1a1a;
  }
  .campo {
    display: flex;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid #EAEAEA;
    font-size: 14px;
  }
  .campo:last-of-type { border-bottom: none; }
  .campo-label { color: #666; }
  .campo-valor { color: #1a1a1a; font-weight: 600; text-align: right; }
  .btn-fechar {
    background: #EAEAEA;
    color: #1a1a1a;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    margin-top: 20px;
  }

  .carregando {
    padding: 40px;
    text-align: center;
    color: #666;
  }

  .erro {
    padding: 30px 20px;
    text-align: center;
    color: #999;
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="cartao">
  <img src="logo.png" alt="Backbone Cervejaria Artesanal" class="logo">
  <div id="conteudo">
    <div class="carregando">Carregando seu cartão...</div>
  </div>
</div>

<div class="modal" id="modal-dados">
  <div class="modal-conteudo">
    <div class="modal-titulo">Dados do cartão</div>
    <div id="dados-lista"></div>
    <button class="btn-fechar" onclick="fecharDados()">Fechar</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script>
const SERVER_URL = "https://backbone-650557630362.us-central1.run.app";
const PUNCHES_META = 7;

const params = new URLSearchParams(window.location.search);
const telefone = params.get("tel");

const MESES = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];

let consumidor = null;

async function carregar() {
  if (!telefone) {
    document.getElementById('conteudo').innerHTML = '<div class="erro">Cartão não encontrado. Confira o link recebido.</div>';
    return;
  }

  try {
    const resp = await fetch(`${SERVER_URL}/consumidor/${telefone}`);
    if (!resp.ok) {
      document.getElementById('conteudo').innerHTML = '<div class="erro">Cartão não encontrado. Faça seu cadastro pelo WhatsApp da Backbone.</div>';
      return;
    }
    consumidor = await resp.json();
    renderizar();
  } catch (e) {
    document.getElementById('conteudo').innerHTML = '<div class="erro">Erro de conexão. Tente novamente em instantes.</div>';
  }
}

function renderizar() {
  const punches = consumidor.punches || 0;
  const disponiveis = consumidor.recompensas_disponiveis || 0;

  // Monta os 8 copos (7 numerados + P)
  let coposHTML = '';
  for (let i = 1; i <= 7; i++) {
    if (i <= punches) {
      coposHTML += `<div class="copo"><img src="img/copo_consumido.png" alt="Chopp ${i} consumido"></div>`;
    } else {
      coposHTML += `<div class="copo"><img src="img/copo_${i}.png" alt="Chopp ${i}"></div>`;
    }
  }
  // Copo do prêmio: desbloqueado se tem recompensa disponível
  const copoP = disponiveis > 0
    ? '<div class="copo"><img src="img/copo_premio_liberado.png" alt="Prêmio disponível"></div>'
    : '<div class="copo"><img src="img/copo_premio_pendente.png" alt="Prêmio a conquistar"></div>';
  coposHTML += copoP;

  document.getElementById('conteudo').innerHTML = `
    <div class="qr-container">
      <canvas id="qr"></canvas>
    </div>
    <img src="img/back2back.png" alt="Back 2 Back" class="promo-nome">
    <div class="copos">${coposHTML}</div>
    <button class="btn-dados" onclick="abrirDados()">Dados do cartão</button>
  `;

  QRCode.toCanvas(document.getElementById('qr'), consumidor.telefone, {
    width: 260,
    margin: 0,
    color: { dark: '#000', light: '#FFF' }
  });
}

function abrirDados() {
  const meses = MESES;
  const nasc = consumidor.nascimento_dia && consumidor.nascimento_mes
    ? `${consumidor.nascimento_dia}/${consumidor.nascimento_mes}`
    : '—';

  let cadastroMes = '—';
  if (consumidor.cadastro_em) {
    const d = new Date(consumidor.cadastro_em);
    cadastroMes = `${meses[d.getMonth()]} de ${d.getFullYear()}`;
  }

  const telFormatado = formatarTelefone(consumidor.telefone);

  document.getElementById('dados-lista').innerHTML = `
    <div class="campo"><span class="campo-label">Nome</span><span class="campo-valor">${consumidor.nome}</span></div>
    <div class="campo"><span class="campo-label">Telefone</span><span class="campo-valor">${telFormatado}</span></div>
    <div class="campo"><span class="campo-label">Bar de origem</span><span class="campo-valor">${consumidor.bar_origem}</span></div>
    <div class="campo"><span class="campo-label">Aniversário</span><span class="campo-valor">${nasc}</span></div>
    <div class="campo"><span class="campo-label">Time do coração</span><span class="campo-valor">${consumidor.time || '—'}</span></div>
    <div class="campo"><span class="campo-label">Associado desde</span><span class="campo-valor">${cadastroMes}</span></div>
    <div class="campo"><span class="campo-label">Chopps já conquistados</span><span class="campo-valor">${consumidor.recompensas_total || 0}</span></div>
  `;
  document.getElementById('modal-dados').classList.add('aberto');
}

function fecharDados() {
  document.getElementById('modal-dados').classList.remove('aberto');
}

function formatarTelefone(tel) {
  if (!tel) return '';
  // Ex: 5521999887766 -> +55 21 99988-7766
  const t = tel.replace(/\D/g, '');
  if (t.length === 13) {
    return `+${t.slice(0,2)} ${t.slice(2,4)} ${t.slice(4,9)}-${t.slice(9)}`;
  }
  return tel;
}

// Recarrega quando volta para a aba (garante atualização após punch)
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) carregar();
});

carregar();
</script>
</body>
</html>
