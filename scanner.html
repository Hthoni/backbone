<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>Clube Backbone — Scanner</title>
<style>
  :root{
    --preto:#000; --preto2:#141414; --linha:#333;
    --branco:#FFF; --cinza-campo:#E4E2DA; --cinza-txt:#A8A8A2;
    --ambar:#E8A317; --rubro:#D8232A; --verde:#1F7A47;
    --sb: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--preto); color:var(--branco);
    font:400 20px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased; overscroll-behavior:none;
  }
  .tela{display:none; min-height:100dvh; flex-direction:column}
  .tela.on{display:flex}

  /* ── HEADER: igual em todas as telas ── */
  .cab{
    display:flex; align-items:center; justify-content:space-between; gap:14px;
    background:var(--preto); padding:calc(env(safe-area-inset-top,0px) + 12px) 18px 12px;
    border-bottom:1px solid var(--linha); flex-shrink:0;
  }
  .cab img{height:40px; width:auto; display:block}
  .cab .id{
    font-size:17px; font-weight:700; color:var(--branco);
    text-align:right; line-height:1.25; letter-spacing:.02em;
  }
  .cab .id small{display:block; font-size:13px; font-weight:400; color:var(--cinza-txt)}

  /* ── LOGIN ── */
  .login{flex:1; display:flex; flex-direction:column; justify-content:center; padding:30px 22px calc(30px + var(--sb))}
  .login h1{font-size:30px; font-weight:800; line-height:1.15; margin-bottom:34px}
  label{display:block; font-size:17px; font-weight:700; letter-spacing:.06em; color:var(--branco); margin:0 0 8px 2px}
  input{
    width:100%; background:var(--cinza-campo); border:2px solid var(--cinza-campo); color:#111;
    font-size:26px; font-weight:600; padding:20px; border-radius:14px; margin-bottom:22px;
  }
  input::placeholder{color:#8A8880; font-weight:400}
  input:focus{outline:none; border-color:var(--ambar)}

  .btn{
    width:100%; border:none; border-radius:16px; padding:24px;
    font-size:24px; font-weight:800; letter-spacing:.01em;
  }
  .btn-1{background:var(--branco); color:#000}
  .btn-2{background:transparent; color:var(--branco); border:2px solid #555}
  .btn:active{transform:scale(.98)}
  .btn[disabled]{opacity:.45}
  .sair{
    background:none; border:2px solid #444; color:var(--branco);
    font-size:15px; font-weight:700; padding:10px 15px; border-radius:999px; flex-shrink:0;
  }

  /* ── SCANNER ── */
  .scan{flex:1; display:flex; flex-direction:column; padding:20px 18px calc(24px + var(--sb))}
  #cam{
    width:100%; aspect-ratio:1; border-radius:22px; overflow:hidden;
    background:var(--preto2); border:2px solid var(--linha); position:relative;
  }
  #cam video{width:100%!important; height:100%!important; object-fit:cover}
  #cam::after{
    content:""; position:absolute; inset:14%; border:4px solid var(--ambar);
    border-radius:16px; pointer-events:none;
  }
  .dica{
    text-align:center; font-size:30px; font-weight:800; line-height:1.25;
    margin:auto 0; padding:26px 0;
  }

  /* ── CONFIRMAÇÃO ── */
  .flood{
    flex:1; display:flex; flex-direction:column; justify-content:center;
    padding:28px 22px; text-align:center;
  }
  .flood.pontuar{background:var(--ambar); color:#150F00}
  .flood.resgatar{background:var(--rubro); color:#fff}
  .flood.boas{background:var(--verde); color:#fff}
  .flood.neutro{background:var(--preto); color:var(--branco)}

  .acao{font-size:24px; font-weight:900; letter-spacing:.14em; margin-bottom:18px}
  .nome{font-size:46px; font-weight:800; line-height:1.05; margin-bottom:22px; word-break:break-word}
  .frase{font-size:32px; line-height:1.25; font-weight:800; margin-bottom:20px}
  .avisinho{
    font-size:23px; line-height:1.35; font-weight:700; padding:16px 18px;
    border-radius:12px; background:rgba(0,0,0,.18); display:block;
  }
  .trilha{display:flex; flex-wrap:wrap; gap:9px; justify-content:center; margin:0 0 26px}
  .pt{width:22px; height:22px; border-radius:50%; border:3px solid currentColor; opacity:.4}
  .pt.cheio{background:currentColor; opacity:1}
  .pt.novo{opacity:1; box-shadow:0 0 0 6px rgba(0,0,0,.2)}

  .acoes{display:flex; gap:12px; padding:16px 18px calc(18px + var(--sb)); background:var(--preto)}
  .acoes .btn{flex:1; padding:26px 10px}

  /* ── RESULTADO ── */
  .fim{flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:30px 22px}
  .selo{
    width:120px; height:120px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:64px; font-weight:700; margin-bottom:28px;
  }
  .selo.ok{background:var(--verde); color:#fff}
  .selo.erro{background:var(--rubro); color:#fff}
  .fim h2{font-size:38px; font-weight:800; line-height:1.15; margin-bottom:16px}
  .fim p{font-size:24px; font-weight:600; line-height:1.35; color:var(--branco); max-width:330px}
  .rodape{padding:16px 18px calc(18px + var(--sb))}

  .erro-msg{color:#FF6B6B; font-size:19px; font-weight:700; margin-bottom:16px; min-height:24px}
  .carregando{text-align:center; color:var(--cinza-txt); padding:60px 20px; font-size:20px; font-weight:600}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<section id="t-login" class="tela on">
  <div class="cab">
    <img src="clube_logo.png" alt="Clube Backbone">
    <div class="id">SCANNER</div>
  </div>
  <div class="login">
    <h1>Entre para registrar chopps.</h1>
    <label for="i-id">SEU CÓDIGO</label>
    <input id="i-id" type="text" autocapitalize="none" autocomplete="username" placeholder="ex.: g01">
    <label for="i-senha">SENHA</label>
    <input id="i-senha" type="password" autocomplete="current-password" placeholder="••••••">
    <div class="erro-msg" id="erro-login"></div>
    <button class="btn btn-1" id="b-entrar">ENTRAR</button>
  </div>
</section>

<!-- ══ SCANNER ══ -->
<section id="t-scan" class="tela">
  <div class="cab">
    <img src="clube_logo.png" alt="Clube Backbone">
    <div style="display:flex;align-items:center;gap:12px">
      <div class="id" id="quem1"></div>
      <button class="sair" id="b-sair">SAIR</button>
    </div>
  </div>
  <div class="scan">
    <div id="cam"></div>
    <p class="dica">Aponte a câmera<br>para o QR do cliente</p>
  </div>
</section>

<!-- ══ CONFIRMAÇÃO ══ -->
<section id="t-conf" class="tela">
  <div class="cab">
    <img src="clube_logo.png" alt="Clube Backbone">
    <div class="id" id="quem2"></div>
  </div>
  <div class="flood" id="flood">
    <div class="acao" id="c-acao"></div>
    <div class="nome" id="c-nome"></div>
    <div class="trilha" id="c-trilha"></div>
    <div class="frase" id="c-frase"></div>
    <div id="c-aviso"></div>
  </div>
  <div class="acoes">
    <button class="btn btn-2" id="b-cancelar">CANCELAR</button>
    <button class="btn btn-1" id="b-confirmar">CONFIRMAR</button>
  </div>
</section>

<!-- ══ RESULTADO ══ -->
<section id="t-fim" class="tela">
  <div class="cab">
    <img src="clube_logo.png" alt="Clube Backbone">
    <div class="id" id="quem3"></div>
  </div>
  <div class="fim">
    <div class="selo" id="f-selo"></div>
    <h2 id="f-titulo"></h2>
    <p id="f-texto"></p>
  </div>
  <div class="rodape">
    <button class="btn btn-1" id="b-novo">ESCANEAR O PRÓXIMO</button>
  </div>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script>
const API = "https://backbone-650557630362.us-central1.run.app";

let garcom = null;
let leitor = null;
let pendente = null;

const $ = id => document.getElementById(id);
const digitos = s => (s || "").replace(/\D/g, "");

function mostrar(qual){
  document.querySelectorAll(".tela").forEach(t => t.classList.remove("on"));
  $("t-" + qual).classList.add("on");
}

/* ── LOGIN ── */
$("b-entrar").onclick = async () => {
  const id = $("i-id").value.trim();
  const senha = $("i-senha").value;
  if(!id || !senha){ $("erro-login").textContent = "Preencha o código e a senha."; return; }

  $("b-entrar").disabled = true;
  $("b-entrar").textContent = "ENTRANDO…";
  try{
    const r = await fetch(API + "/login", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({id, senha})
    });
    const d = await r.json();
    if(!r.ok){
      $("erro-login").textContent = d.erro === "garcom_inativo"
        ? "Seu acesso está desativado. Fale com o gerente."
        : "Código ou senha incorretos.";
      return;
    }
    garcom = d;
    localStorage.setItem("bb_garcom", JSON.stringify(d));
    entrar();
  }catch(e){
    $("erro-login").textContent = "Sem conexão. Tente de novo.";
  }finally{
    $("b-entrar").disabled = false;
    $("b-entrar").textContent = "ENTRAR";
  }
};

$("b-sair").onclick = () => {
  localStorage.removeItem("bb_garcom");
  pararCamera();
  garcom = null;
  mostrar("login");
};

function entrar(){
  const txt = garcom.nome + "<small>" + (garcom.bar_nome || garcom.bar_id) + "</small>";
  ["quem1","quem2","quem3"].forEach(k => $(k).innerHTML = txt);
  mostrar("scan");
  iniciarCamera();
}

/* Extrai o telefone do QR: aceita a URL /q/<tel> (formato novo)
   e o telefone puro (cartoes antigos). */
function extrairTelefone(texto){
  const m = String(texto).match(/\/q\/(\d{10,13})/);
  if(m) return m[1];
  return digitos(texto);
}

/* ── CÂMERA ── */
async function iniciarCamera(){
  if(leitor) return;
  leitor = new Html5Qrcode("cam", { verbose:false });
  try{
    await leitor.start(
      { facingMode: "environment" },
      { fps:10, qrbox:{width:240, height:240} },
      texto => { pararCamera(); consultar(extrairTelefone(texto)); },
      () => {}
    );
  }catch(e){
    $("cam").innerHTML = '<div class="carregando">Câmera indisponível.<br>Libere o acesso à câmera e recarregue a página.</div>';
    leitor = null;
  }
}
function pararCamera(){
  if(!leitor) return;
  leitor.stop().catch(()=>{}).finally(() => { try{ leitor.clear(); }catch(e){} leitor = null; });
}

/* ── CONSULTA ── */
async function consultar(telefone){
  mostrar("conf");
  $("flood").className = "flood neutro";
  $("c-acao").textContent = "";
  $("c-nome").textContent = "Consultando…";
  $("c-trilha").innerHTML = ""; $("c-frase").textContent = ""; $("c-aviso").innerHTML = "";

  try{
    const r = await fetch(API + "/consumidor/" + telefone);
    if(!r.ok){ falhar("Cartão não encontrado", "Esse cliente não está cadastrado no Clube."); return; }
    const c = await r.json();

    const meta = c.meta || c.punches_para_recompensa || 10;
    const punches = c.punches || 0;
    const abertas = (c.recompensas || []).filter(x => !x.resgatada);
    abertas.sort((a,b) => (a.tipo === "boas_vindas" ? 0 : 1) - (b.tipo === "boas_vindas" ? 0 : 1));

    let plano;
    if(abertas.length && abertas[0].tipo === "boas_vindas"){
      plano = {
        cor:"boas", acao:"BOAS-VINDAS",
        frase:"Entregue 1 chopp grátis",
        aviso:"É o chopp de cadastro. Não conta ponto na cartela.",
        pontos:{ cheios:punches, meta, novo:-1 }
      };
    } else if(abertas.length){
      plano = {
        cor:"resgatar", acao:"RESGATE",
        frase:"Entregue 1 chopp grátis",
        aviso:"A cartela está cheia. Ao confirmar, ela zera e uma nova começa.",
        pontos:{ cheios:meta, meta, novo:-1 }
      };
    } else {
      const vira = punches + 1;
      const fecha = vira >= meta;
      plano = {
        cor:"pontuar", acao:"REGISTRAR CHOPP",
        frase: fecha ? "Este chopp FECHA a cartela" : "Marcar o chopp " + vira + " de " + meta,
        aviso: fecha
          ? "Ao confirmar, o cliente ganha 1 chopp grátis. Avise ele."
          : "Faltam " + (meta - vira) + " para o chopp grátis.",
        pontos:{ cheios:punches, meta, novo: vira - 1 }
      };
    }

    pendente = { telefone, plano };
    pintar(c.nome, plano);
  }catch(e){
    falhar("Sem conexão", "Verifique a internet e tente de novo.");
  }
}

function pintar(nome, p){
  $("flood").className = "flood " + p.cor;
  $("c-acao").textContent = p.acao;
  $("c-nome").textContent = nome;
  $("c-frase").textContent = p.frase;
  $("c-aviso").innerHTML = '<span class="avisinho">' + p.aviso + "</span>";
  let html = "";
  for(let i = 0; i < p.pontos.meta; i++){
    const cls = ["pt"];
    if(i < p.pontos.cheios) cls.push("cheio");
    if(i === p.pontos.novo) cls.push("cheio","novo");
    html += '<span class="' + cls.join(" ") + '"></span>';
  }
  $("c-trilha").innerHTML = html;
}

$("b-cancelar").onclick = () => { pendente = null; mostrar("scan"); iniciarCamera(); };

/* ── CONFIRMA ── */
$("b-confirmar").onclick = async () => {
  if(!pendente) return;
  $("b-confirmar").disabled = true;
  $("b-confirmar").textContent = "GRAVANDO…";
  try{
    const r = await fetch(API + "/scan", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ telefone: pendente.telefone, garcom_id: garcom.garcom_id, bar: garcom.bar_id })
    });
    const d = await r.json();
    if(!r.ok){ falhar("Não deu certo", d.erro || "Tente novamente."); return; }

    concluir("ok",
      d.acao === "resgate" ? "Entregue o chopp"
        : (d.recompensa_gerada ? "Cartela fechada!" : "Chopp registrado"),
      d.mensagem_garcom || "");
  }catch(e){
    falhar("Sem conexão", "O chopp NÃO foi registrado. Tente de novo.");
  }finally{
    $("b-confirmar").disabled = false;
    $("b-confirmar").textContent = "CONFIRMAR";
  }
};

function concluir(tipo, titulo, texto){
  $("f-selo").className = "selo " + tipo;
  $("f-selo").textContent = tipo === "ok" ? "✓" : "!";
  $("f-titulo").textContent = titulo;
  $("f-texto").textContent = texto;
  pendente = null;
  mostrar("fim");
}
function falhar(t, x){ concluir("erro", t, x); }

$("b-novo").onclick = () => { mostrar("scan"); iniciarCamera(); };

/* ── INÍCIO ── */
(function(){
  const salvo = localStorage.getItem("bb_garcom");
  if(salvo){ try{ garcom = JSON.parse(salvo); entrar(); return; }catch(e){} }
  mostrar("login");
})();
</script>
</body>
</html>
